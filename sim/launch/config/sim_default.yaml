simulation:
  gui: true
  launcher_backend: isaacsim
  setup_ros2_python_bridge: true
  sync_mtc_demo_object: true
  clock_mode: wall-anchored
  steps: 200000
  render_interval: 2000

bridge:
  articulation_prim: /mobile_base_with_franka
  joint_commands_topic: /joint_commands
  joint_states_topic: /joint_states
  clock_topic: /clock
  ros2_node_name: isaac_python_joint_bridge
  publish_every_steps: 1

smoothing:
  disable_position_command_smoothing: false
  default_max_joint_velocity: 2.0
  max_joint_step_rad: 0.03

demo_object:
  demo_object_prim: /World/demo_cube
  demo_object_size: 0.04,0.04,0.12
  demo_object_pick_position: 0.55,0.0,0.60
  demo_object_color: 0.9,0.3,0.1

runtime:
  ros2_env_mode: internal
  ros2_distro: humble
