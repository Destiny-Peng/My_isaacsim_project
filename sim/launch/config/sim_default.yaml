simulation:
  headless: true
  extensions:
    - omni.physx.ui
  setup_ros2_python_bridge: true
  sync_mtc_demo_object: true
  sync_demo_support_surface: true
  clock_mode: sim
  steps: 200000
  render_interval: 2000

bridge:
  articulation_prim: /mobile_base_with_franka
  joint_commands_topic: /joint_commands
  joint_states_topic: /joint_states
  clock_topic: /clock
  ros2_node_name: isaac_python_joint_bridge
  publish_every_steps: 4

smoothing:
  disable_position_command_smoothing: false
  default_max_joint_velocity: 2.5
  max_joint_step_rad: 0.03

demo_object:
  demo_object_prim: /Cube
  demo_object_pick_position: 0.55,0.0,0.67
  support_surface_prim: /Plane
  support_surface_center: 0.55,0.0,0.60

runtime:
  ros2_env_mode: internal
  ros2_distro: humble
  initial_joint_positions_yaml: ros2_ws/src/moveit_robot_config/config/initial_positions.yaml

grasp_eval:
  enable_grasp_metric_eval: false
  grasp_eval_object_prim: /Cube
  grasp_eval_gripper_prim: /mobile_base_with_franka/panda_panda_hand
  grasp_eval_table_prim: /Plane
  grasp_eval_target_z: 0.67
  grasp_eval_gripper_joint_name: panda_finger_joint1
  grasp_eval_gripper_close_threshold: 0.015
  grasp_eval_slip_threshold: -0.02
  grasp_eval_output_prefix: sim/outputs/grasp_eval

force_control:
  # URDF path for Pinocchio dynamics model (relative to project root)
  urdf_path: sim/force_control/reference/urdf/panda.urdf
  # urdf_path: ros2_ws/src/robot_description/urdf/arm_only_franka.urdf
  # Joint-space impedance controller defaults for franka_force_control_standalone.py
  kp: [120.0, 120.0, 110.0, 100.0, 80.0, 60.0, 40.0]
  damping_ratio: 1.0
  torque_limit: [80.0, 80.0, 80.0, 60.0, 40.0, 30.0, 20.0]
  q_target: [0.0, -0.785, 0.0, -2.356, 0.0, 1.571, 0.785]
  physics_dt: 0.005
  render_rate_hz: 10
  max_steps: 0
  headless: false
  auto_fix_physics: false
  # Physics solver iterations for stable force control (higher = more stable)
  solver_position_iterations: 32
  solver_velocity_iterations: 4
  # CSV recording output prefix
  record: false
  recording_output_prefix: sim/outputs/force_control
