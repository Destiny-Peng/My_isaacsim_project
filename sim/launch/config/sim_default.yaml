simulation:
  headless: true
  launcher_backend: isaacsim
  setup_ros2_python_bridge: true
  sync_mtc_demo_object: true
  sync_demo_support_surface: true
  clock_mode: sim
  steps: 200000
  render_interval: 2000

bridge:
  articulation_prim: /mobile_base_with_franka
  joint_commands_topic: /joint_commands
  joint_states_topic: /joint_states
  clock_topic: /clock
  ros2_node_name: isaac_python_joint_bridge
  publish_every_steps: 1

smoothing:
  disable_position_command_smoothing: false
  default_max_joint_velocity: 2.5
  max_joint_step_rad: 0.03

demo_object:
  demo_object_prim: /Cube
  demo_object_size: 0.04,0.04,0.12
  demo_object_pick_position: 0.55,0.0,0.60
  demo_object_color: 0.9,0.3,0.1
  demo_object_dynamic: true
  demo_object_mass_kg: 0.08
  demo_object_enable_ccd: true
  demo_object_static_friction: 1.2
  demo_object_dynamic_friction: 1.0
  demo_object_restitution: 0.0
  demo_object_linear_damping: 1.0
  demo_object_angular_damping: 1.0
  demo_object_contact_offset: 0.005
  demo_object_rest_offset: 0.0
  demo_object_solver_position_iterations: 16
  demo_object_solver_velocity_iterations: 4
  support_surface_prim: /Plane
  support_surface_size: 0.8,0.8,0.10
  support_surface_center: 0.55,0.0,0.49
  support_surface_color: 0.65,0.62,0.56
  support_surface_static_friction: 1.4
  support_surface_dynamic_friction: 1.2
  support_surface_restitution: 0.0

runtime:
  ros2_env_mode: internal
  ros2_distro: humble
  initial_joint_positions_yaml: ros2_ws/src/moveit_robot_config/config/initial_positions.yaml
