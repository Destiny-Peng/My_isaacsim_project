mtc_pick_place_demo:
  ros__parameters:
    arm_group_name: arm
    hand_group_name: hand
    hand_frame: panda_panda_hand
    world_frame: world
    object_name: demo_cube
    support_surface: demo_table

    pregrasp: open
    grasp: close
    task_timeout_sec: 180.0
    execute: true

    pick_pose_xyz: [0.387, -0.233, 0.70]
    place_pose_xyz: [0.55, 0.2, 0.70]

    object_size_xyz: [0.02, 0.02, 0.12]
    support_surface_xyz: [0.55, 0.0, 0.61]
    support_surface_size_xyz: [0.8, 0.8, 0.05]
    grasp_x_offset: -0.1
    grasp_y_offset: 0.0
    grasp_z_offset: 0.0
    grasp_rpy: [0.785, 0.0, 0.0]
    grasp_angle_delta: 0.261799388
    grasp_max_ik_solutions: 4
    grasp_ik_ignore_collisions: true
    additional_allowed_collision_links: [panda_panda_link7, panda_panda_link6]
    pick_pose_topic: /mtc_pick_place_demo/pick_pose
    place_pose_topic: /mtc_pick_place_demo/place_pose
    use_external_pick_pose: true
    use_external_place_pose: true
    goal_joint_tolerance: 0.00001
    approach_min_distance: 0.1
    approach_distance: 0.15
    lift_min_distance: 0.005
    lift_distance: 0.12
    place_lower_min_distance: 0.0
    place_lower_distance: 0.13
    move_to_pick_timeout_sec: 15.0
    move_to_place_timeout_sec: 15.0
    plan_velocity_scaling: 1.0
    plan_acceleration_scaling: 1.0
    cartesian_step_size: 0.5
    place_max_ik_solutions: 4
